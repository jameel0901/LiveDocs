name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "Front-end/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Front-end

    env:
      REACT_APP_API_BASE_URL: https://livedocs-gool.onrender.com
      REACT_APP_SOCKET_URL: https://livedocs-gool.onrender.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish build to docs/
        run: |
          rm -rf ../docs/*
          cp -r build/* ../docs/

      - name: Commit and push docs
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No docs changes to deploy."
            exit 0
          fi
          git commit -m "Deploy frontend to GitHub Pages [skip ci]"
          git push
