name: Deploy backend to Render

on:
  push:
    branches: [main]
    paths:
      - "Back-end/**"
      - "render.yaml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set."
            echo "Enable auto-deploy in Render, or add a deploy hook URL as a GitHub secret."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK_URL"
          echo "Render deploy triggered."
